<script>
const HASH = 'a57170600cbbc87c16827e39ed6b5b003184a65288e9791eb6be87872735bdf6'; // SHA-256

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const val = document.getElementById('pwd-input').value;
  const hash = await sha256(val);
  if (hash === HASH) {
    sessionStorage.setItem('lpg_auth','1');
    document.getElementById('login-screen').remove();
  } else {
    document.getElementById('pwd-error').textContent = 'Password errata — riprova';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

if (sessionStorage.getItem('lpg_auth') === '1') {
  document.getElementById('login-screen').remove();
}
</script>

// ── API ───────────────────────────────────────────────────────────
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function apiCall(system, messages, useWebSearch = false, model = MODEL, maxTokens = 4000) {
  const body = { model: model, max_tokens: maxTokens, system, messages };
  if (useWebSearch) body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
  const maxRetry = 4;
  for (let attempt = 0; attempt <= maxRetry; attempt++) {
    let data;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': state.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(body),
      });
      data = await res.json();
    } catch(netErr) {
      if (attempt < maxRetry) { await retryWait(attempt, 'rete instabile'); continue; }
      return { error: { message: 'Errore di rete: ' + netErr.message } };
    }
    // Errori temporanei → ritenta con attesa crescente
    const et = data && data.error && (data.error.type || '');
    const em = data && data.error && (data.error.message || '');
    const temporaneo = /overload/i.test(et) || /overload/i.test(em) || et === 'rate_limit_error' || /rate limit/i.test(em);
    if (temporaneo && attempt < maxRetry) {
      await retryWait(attempt, /rate limit/i.test(em+et) ? 'rate limit, attendo' : 'server occupato, riprovo');
      continue;
    }
    return data;
  }
}

// Attesa esponenziale con countdown visibile: 5s, 10s, 20s, 40s
async function retryWait(attempt, motivo) {
  const secs = 5 * Math.pow(2, attempt);
  const prev = state.loadingMsg;
  for (let s = secs; s > 0; s--) {
    state.loadingMsg = `${motivo}… nuovo tentativo tra ${s}s`;
    render();
    await sleep(1000);
  }
  state.loadingMsg = prev;
  render();
}

function extractText(data) {
  return (data.content || []).map(b => b.type === 'text' ? b.text : '').filter(Boolean).join('\n');
}

function parseJSON(text) {
  try { return JSON.parse(text.trim()); } catch {}
  const clean = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
  try { return JSON.parse(clean); } catch {}
  const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
  if (s === -1 || e === -1) throw new Error('Risposta non in JSON: ' + clean.slice(0, 150));
  const slice = clean.slice(s, e + 1);
  try { return JSON.parse(slice); } catch {}
  // Tentativo di riparazione: rimuove virgole pendenti e inserisce virgole mancanti tra }/] e "/{/[
  try {
    let fixed = slice
      .replace(/,(\s*[}\]])/g, '$1')                 // virgola pendente prima di } o ]
      .replace(/([}\]"])(\s*)("[^"]*"\s*:)/g, '$1,$2$3') // manca virgola prima di una nuova chiave
      .replace(/([}\]])(\s*)([{\[])/g, '$1,$2$3');   // manca virgola tra due oggetti/array
    return JSON.parse(fixed);
  } catch {}
  // Fallisce: rilancia con flag, così il chiamante puo decidere di non bloccare
  const err = new Error('JSON malformato: ' + slice.slice(0,120) + '...');
  err.rawText = slice;
  throw err;
}

      briefJson: state.briefJson,

function loadSession() {
  try {

    if (s.form) state.form = s.form;
    if (s.research) state.research = s.research;
    if (s.briefJson) state.briefJson = s.briefJson;
    if (s.copy) state.copy = s.copy;

      state.step = s.step;
      state.maxStep = s.maxStep || s.step;
      state.sessionRestored = true;
    }
    return true;
  } catch { return false; }
}

    const data = await apiCall(SYS_COPY, [{ role:'user', content:`BRIEF JSON (unica fonte di verità — ogni numero e claim deve venire da qui):\n${state.briefJson}\n\nGenera il copy completo della landing. JSON puro con questo schema:\n{"brandName":"NomeProdotto™","titolo_1":"titolo angolo piu forte (vedi 4 angoli e esempi)","titolo_2":"titolo con angolo DIVERSO dal primo","subtitle":"sottotitolo = prova tecnica del titolo, max 30 parole","bullets":["<b>Spec con numero</b>: vita quotidiana + contrasto","x5 totali, ordine = gerarchia_funzionalita"],"ctaText":"ATTIVA LO SCONTO","ctaTematizzata":"verbo del beneficio + oggetto del desiderio","marquee":["✨ miglior spec o difetto eliminato","✨ Sconto [sconto_pct]% Attivo Oggi","💸 Pagamento alla Consegna Sicuro"],"vantaggi":[{"titolo":"angle 1 dal brief","testo":"<p>paragrafo a 4 movimenti con <strong>spec</strong></p>"},{"titolo":"angle 2","testo":"<p>...</p>"},{"titolo":"angle 3","testo":"<p>...</p>"}],"faq":[{"domanda":"obiezione 1 in prima persona","risposta":"rassicurazione + spec"},{"domanda":"...x6 dal brief"},{"domanda":"Come funziona il reso?","risposta":"Puoi restituirlo entro [giorni_reso] giorni senza costi aggiuntivi."},{"domanda":"Quanto impiega l'ordine ad arrivare?","risposta":"Spedizione in 24-48 ore tramite corriere espresso."}],"pricing":{"title":"Solo per Oggi - [sconto_pct]%","prezzoOriginale":"[prezzo_pieno]","prezzoScontato":"[prezzo_scontato]","items":["1 NomeProdotto™","voci bundle dal brief con (valore €X)","Garanzia [garanzia_anni] anni"]},"cosRicevi":"Ordinando Ora Ricevi:","recensioni":[{"nome":"Nome e iniziale cognome italiani realistici","eta_citta":"XX anni, Città","paura":"il problema concreto e specifico che questa recensione risolve","testo":"40-60 parole: parte dalla situazione precisa in cui il problema si presentava e mostra come il prodotto lo ha risolto, con un dettaglio concreto dal brief, registro sobrio da recensione vera","stelle":5},{"nome":"Nome 2","eta_citta":"XX anni, Città","paura":"problema DIVERSO dal 1","testo":"come sopra, risolve il problema 2","stelle":5},{"nome":"Nome 3","eta_citta":"XX anni, Città","paura":"problema DIVERSO da 1 e 2","testo":"come sopra, risolve il problema 3","stelle":4}]}` }]);
    if (data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    const text = extractText(data);
    if (!text.trim()) throw new Error('Risposta vuota — riprova');
    let c;
    try {
      c = parseJSON(text);
    } catch(je) {
      // Auto-riparazione: rimanda il JSON rotto al modello chiedendo solo di correggerlo
      state.loadingMsg = 'Correggo il formato della risposta…'; render();
      const fixData = await apiCall('Ricevi un JSON non valido e lo restituisci corretto e parsabile. Non cambiare i contenuti, correggi solo la sintassi: virgolette doppie non chiuse dentro i testi (sostituiscile con « »), virgole mancanti o pendenti, parentesi sbilanciate. Rispondi SOLO con il JSON corretto, nessun altro testo.',
        [{ role:'user', content: text }], false, MODEL_RESEARCH, 4000);
      c = parseJSON(extractText(fixData));
    }
    c.headline_A = c.titolo_1 || c.headline_A;
    c.headline_B = c.titolo_2 || c.headline_B;
    c.headline = c.headline || c.headline_A;
    c._recensioniAI = Array.isArray(c.recensioni) ? c.recensioni.slice() : [];
    if (state.realReviews.trim()) c.recensioni = parseRealReviews(state.realReviews);
    state.copy = c;
    state.check = null;
    goToStep(3); saveSession();
  } catch(e) { state.error = 'Errore copy: ' + e.message; }
  finally { state.loading = false; render(); }
}

// Recensioni reali incollate dall'utente: "Nome | 64 anni, Bergamo | testo | 5" (una per riga)
function parseRealReviews(txt) {
  return txt.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const p = l.split('|').map(s=>s.trim());
    return { nome:p[0]||'', eta_citta:p[1]||'', testo:p[2]||'', stelle:Math.min(5,Math.max(1,parseInt(p[3])||5)) };
  }).filter(r=>r.nome && r.testo);
}

// Coherence check pre-pubblicazione (non bloccante)
async function runCheck() {
  if (!state.copy || !state.apiKey) return;
  state.checking = true; state.check = null; render();
  try {
    const data = await apiCall(SYS_CHECK, [{ role:'user', content:`BRIEF JSON:\n${state.briefJson||'(non disponibile)'}\n\nCOPY GENERATO:\n${JSON.stringify(state.copy,null,1)}\n\nVerifica coerenza e completezza.` }], false, MODEL_RESEARCH);
    if (data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    state.check = parseJSON(extractText(data));
  } catch(e) { state.check = { ok:false, errori:[{dove:'check',problema:e.message,correzione:'Riprova il check'}] }; }
  state.checking = false; render();
}

async function publishWP() {

// ── RENDER ────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==='class') e.className=v;
    else if (k.startsWith('on')) e[k]=v;
    else if (k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if (k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c => { if(c!==null&&c!==undefined&&c!==false) e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}

function lbl(text) { return el('span',{class:'lbl'},text); }
function card(children, cls='') { return el('div',{class:`card ${cls}`},...(Array.isArray(children)?children:[children])); }
function btn(cls,label,onclick,disabled=false) {
  const b = el('button',{class:cls,onclick},...(Array.isArray(label)?label:[label]));
  if(disabled) b.disabled=true; return b;
}
function inp(placeholder,value,oninput,type='text') {
  const e=el('input',{type,placeholder,value}); e.oninput=oninput; return e;
}
function ta(placeholder,value,oninput,rows=5) {
  const e=document.createElement('textarea');
  e.rows=rows; e.placeholder=placeholder; e.value=value; e.oninput=oninput; return e;
}

function renderStepper() {
  const STEPS = ['Prodotto','Ricerca','Copy','Pubblica'];
  const wrap = el('div',{class:'stepper'});
  STEPS.forEach((s,i) => {
    const st = state.step > i+1 ? 'done' : state.step === i+1 ? 'active' : '';
    const canClick = i+1 <= state.maxStep;
    const dot = el('div',{class:`step-dot ${st}${canClick&&st!=='active'?' clickable':''}`}, st==='done'?'✓':String(i+1));
    const lblEl = el('span',{class:`step-lbl ${st}`},s);
    const grp = el('div',{style:{display:'flex',alignItems:'center',cursor:canClick?'pointer':'default'}},dot,lblEl);
    if (canClick && st !== 'active') grp.onclick = () => { state.step=i+1; render(); };
    wrap.appendChild(grp);
    if (i < STEPS.length-1) wrap.appendChild(el('div',{class:`step-line ${state.step>i+1?'done':''}`}));
  });
  return wrap;
}

function render() {
  document.body.className = state.dark ? 'dark' : 'light';
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Header
  app.appendChild(el('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:state.showSettings?'1rem':'1.75rem',gap:'10px'}},

        el('div',{style:{width:'6px',height:'6px',borderRadius:'50%',background:'var(--accent)'}}),

      el('h1',{style:{fontSize:'22px',fontWeight:'700',letterSpacing:'-.3px',lineHeight:'1.2',marginBottom:'4px'}},'LP Generator Pro'),
      el('p',{style:{color:'var(--text-sub)',fontSize:'12.5px',lineHeight:'1.5'}},'Ricerca → Prodotto ideale → Copy → Pubblica su WordPress')
    ),
    el('div',{style:{display:'flex',alignItems:'center',gap:'10px',flexShrink:'0'}},
      btn('btn-s',state.showSettings?'✕':'⚙',()=>{state.showSettings=!state.showSettings;render();}),
      el('div',{style:{display:'flex',alignItems:'center',gap:'7px'}},
        el('span',{},'☀️'),
        el('div',{class:`toggle-track ${state.dark?'on':''}`,onclick:()=>{state.dark=!state.dark;render();}},
          el('div',{class:`toggle-thumb ${state.dark?'on':''}`})
        ),
        el('span',{},'🌙')
      )
    )
  ));

  // Settings
  app.appendChild(renderSettings());

  // Stepper
  app.appendChild(renderStepper());

  // Error
  if (state.error) app.appendChild(el('div',{class:'error-box'},el('span',{},'⚠'),' '+state.error));

  // Session restored banner
  if (state.sessionRestored) app.appendChild(
    el('div',{style:{padding:'10px 14px',background:'var(--green-bg)',border:'1px solid rgba(22,163,74,.3)',borderRadius:'8px',marginBottom:'1.25rem',fontSize:'13px',color:'var(--green)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}},
      el('span',{},`✓ Sessione precedente ripristinata — step ${state.step}`),
      el('div',{style:{display:'flex',gap:'6px'}},
        el('button',{onclick:()=>{state.sessionRestored=false;render();},style:{background:'none',border:'none',cursor:'pointer',color:'var(--green)',fontSize:'13px'}},'OK'),
        el('button',{onclick:clearSession,style:{background:'none',border:'1px solid rgba(22,163,74,.4)',borderRadius:'6px',cursor:'pointer',color:'var(--green)',fontSize:'12px',padding:'2px 10px'}},'Ricomincia')
      )
    )
  );

  // Step content
  const content = state.step===1?renderStep1():state.step===2?renderStep2():state.step===3?renderStep3():renderStep4();
  app.appendChild(content);
}
