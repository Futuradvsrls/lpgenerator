<script>
const HASH = 'a57170600cbbc87c16827e39ed6b5b003184a65288e9791eb6be87872735bdf6'; // SHA-256

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const val = document.getElementById('pwd-input').value;
  const hash = await sha256(val);
  if (hash === HASH) {
    sessionStorage.setItem('lpg_auth','1');
    document.getElementById('login-screen').remove();
  } else {
    document.getElementById('pwd-error').textContent = 'Password errata — riprova';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

if (sessionStorage.getItem('lpg_auth') === '1') {
  document.getElementById('login-screen').remove();
}
</script>

        cfg.deensimc_repeater_testimonial_main = copy.recensioni.map((r,i) => {
          const g = getGenderT(r.nome);
          const pool = g==='women' ? womenPool : menPool;
          const used = g==='women' ? usedW : usedM;
          const avN = pool.find(n => !used.includes(n)) || pool[i % pool.length];
          used.push(avN);
          return {
            deensimc_testimonial_name: r.nome,
            deensimc_testimonial_title: r.eta_citta,
            deensimc_testimonial_content: r.testo,

            deensimc_testimonial_rating_in_text: '',
            _id: `rec_${i}`
          };
        });
      }

      // rece-01: Google review card (container con children)
      if (css === 'rece-01' && copy.recensioni?.[0]) {
        const r = copy.recensioni[0];
        const stars = '★'.repeat(r.stelle||5) + '☆'.repeat(5-(r.stelle||5));
        const femaleNamesR = ['maria','anna','elena','giulia','laura','sara','francesca','chiara','martina','valentina','paola','rosa','roberta','angela','lucia','carla','silvia','monica','daniela','stefania','cristina','barbara','alessandra','giovanna','rita','antonella','federica','simona','serena','ilaria','beatrice','marta','elisa','concetta','carmela'];
        const firstR = (r.nome||'').split(' ')[0].toLowerCase().replace(/[^a-z]/g,'');
        const genderR = femaleNamesR.includes(firstR)||(firstR.endsWith('a')&&!['luca','andrea','mattia','nicola'].includes(firstR))?'women':'men';
        const avNR = (r.nome.length*7+r.nome.charCodeAt(0)*3)%70+1;
        const avatarUrl = `https://randomuser.me/api/portraits/${genderR}/${avNR}.jpg`;
        const walkRece = els => {
          if (!Array.isArray(els)) return;
          let hc = 0;
          for (const child of els) {
            if (!child||typeof child!=='object') continue;
            const cCfg = child.settings||{};
            const cWt = child.widgetType||'';
            if (cWt==='heading') { if(hc===0) cCfg.title=r.nome; if(hc===1) cCfg.title=r.eta_citta; hc++; }
            if (cWt==='text-editor'&&cCfg.editor!==undefined) cCfg.editor=`<p>${r.testo}</p>`;
            if (cWt==='image'&&cCfg.image) {
              const u=cCfg.image.url||'';

                cCfg.image={...cCfg.image,id:'',url:avatarUrl};
            }
            walkRece(child.elements||[]);
          }
        };
        walkRece(el.elements||[]);
      }

      if (css === 'indirizzo-footer' && copy.azienda) {

        cfg.custom_css = '.elementor-widget-deensimc-smooth-text{padding-bottom:0!important;margin-bottom:0!important;}';

      if (Array.isArray(el.elements)) walk(el.elements);
    }
  }
  walk(json.content);
  json.title = `LP - ${copy.brandName} - ${new Date().toISOString().slice(0,10)}`;
  return json;
}

let _renderTimer = null;
function scheduleRender() {
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(render, 1500);
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==='class') e.className=v;
    else if (k.startsWith('on')) e[k]=v;
    else if (k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if (k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c => { if(c!==null&&c!==undefined&&c!==false) e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}

function lbl(text) { return el('span',{class:'lbl'},text); }
function card(children, cls='') { return el('div',{class:`card ${cls}`},...(Array.isArray(children)?children:[children])); }
function btn(cls,label,onclick,disabled=false) {
  const b = el('button',{class:cls,onclick},...(Array.isArray(label)?label:[label]));
  if(disabled) b.disabled=true; return b;
}
function inp(placeholder,value,oninput,type='text') {
  const e=el('input',{type,placeholder,value});
  e.oninput = ev => { oninput(ev); scheduleRender(); };
  return e;
}
function ta(placeholder,value,oninput,rows=5) {
  const e=document.createElement('textarea');
  e.rows=rows; e.placeholder=placeholder; e.value=value;
  e.oninput = ev => { oninput(ev); scheduleRender(); };
  return e;
}

function renderStepper() {
  const STEPS = ['Prodotto','Ricerca','Copy','Pubblica'];
  const wrap = el('div',{class:'stepper'});
  STEPS.forEach((s,i) => {
    const st = state.step > i+1 ? 'done' : state.step === i+1 ? 'active' : '';
    const canClick = i+1 <= state.maxStep;
    const dot = el('div',{class:`step-dot ${st}${canClick&&st!=='active'?' clickable':''}`}, st==='done'?'✓':String(i+1));
    const lblEl = el('span',{class:`step-lbl ${st}`},s);
    const grp = el('div',{style:{display:'flex',alignItems:'center',cursor:canClick?'pointer':'default'}},dot,lblEl);
    if (canClick && st !== 'active') grp.onclick = () => { state.step=i+1; render(); };
    wrap.appendChild(grp);
    if (i < STEPS.length-1) wrap.appendChild(el('div',{class:`step-line ${state.step>i+1?'done':''}`}));
  });
  return wrap;
}

    el('div',{style:{display:'flex',alignItems:'center',gap:'10px',flexShrink:'0'}},
      btn('btn-s',state.showSettings?'✕':'⚙',()=>{state.showSettings=!state.showSettings;render();}),
      el('div',{style:{display:'flex',alignItems:'center',gap:'7px'}},
        el('span',{},'☀️'),
        el('div',{class:`toggle-track ${state.dark?'on':''}`,onclick:()=>{state.dark=!state.dark;render();}},
          el('div',{class:`toggle-thumb ${state.dark?'on':''}`})
        ),
        el('span',{},'🌙')
      )
    )
  ));

  // Settings
  app.appendChild(renderSettings());

  // Stepper
  app.appendChild(renderStepper());

  // Error
  if (state.error) app.appendChild(el('div',{class:'error-box'},el('span',{},'⚠'),' '+state.error));

  // Session restored banner
  if (state.sessionRestored) app.appendChild(
    el('div',{style:{padding:'10px 14px',background:'var(--green-bg)',border:'1px solid rgba(22,163,74,.3)',borderRadius:'8px',marginBottom:'1.25rem',fontSize:'13px',color:'var(--green)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}},
      el('span',{},`✓ Sessione precedente ripristinata — step ${state.step}`),
      el('div',{style:{display:'flex',gap:'6px'}},
        el('button',{onclick:()=>{state.sessionRestored=false;render();},style:{background:'none',border:'none',cursor:'pointer',color:'var(--green)',fontSize:'13px'}},'OK'),
        el('button',{onclick:clearSession,style:{background:'none',border:'1px solid rgba(22,163,74,.4)',borderRadius:'6px',cursor:'pointer',color:'var(--green)',fontSize:'12px',padding:'2px 10px'}},'Ricomincia')
      )
    )
  );

  // Step content
  const content = state.step===1?renderStep1():state.step===2?renderStep2():state.step===3?renderStep3():renderStep4();
  app.appendChild(content);
}

cante, anche senza olio. Un ottimo aiuto in cucina, la consiglio.", "deensimc_testimonial_image": {"id": 51116, "url": "https://shopgadgetitalia.com/wp-content/uploads/2026/04/23-2-1-1.jpg"}, "deensimc_testimonial_title": "57 anni, Roma", "deensimc_testimonial_show_rating": "yes", "deensimc_testimonial_rating_in_text": ""}, {"deensimc_testimonial_name": "Mario", "_id": "5a05889", "deensimc_testimonial_content": "All\u2019inizio ero scettico, poi mi sono ricreduto. \u00c8 solida, non complicata e fa bene il suo lavoro. Con il doppio cestello preparo carne e patate insieme e mangiamo tutti alla stessa ora. Consuma meno del forno e il cibo \u00e8 gustoso. Per me \u00e8 promossa.", "deensimc_testimonial_image": {"id": 51117, "url": "https://shopgadgetitalia.com/wp-content/uploads/2026/04/21-1-1.jpg"}, "deensimc_testimonial_title": "53 Anni, Padova", "deensimc_testimonial_show_rating": "yes", "deensimc_testimonial_rating_num": 4.5}, {"deensimc_testimonial_name": "Maria", "deensimc_testimonial_content": "Non sono molto pratica di elettrodomestici moderni, ma questa friggitrice \u00e8 davvero facile da usare. Il doppio cestello \u00e8 comodissimo: preparo il secondo e il contorno insieme senza stress. I cibi vengono ben cotti e leggeri. La uso spesso e la pulizia \u00e8 semplice, che per me \u00e8 fondamentale.", "deensimc_testimonial_image": {"id": 51118, "url": "https://shopgadgetitalia.com/wp-content/uploads/2026/04/47-2-1-1.jpg"}, "deensimc_testimonial_title": "63 Anni, Casalinga", "deensimc_testimonial_show_rating": "yes", "deensimc_testimonial_rating_num": 4, "_id": "bf0b331"}], "deensimc_tesimonial_excerpt_length": "", "deensimc_tesimonial_excerpt_title": "", "deensimc_tesimonial_excerpt_title_less": "", "deensimc_marquee_vertical_orientation": "", "deensimc_testimonial_widget_box_width": {"unit": "px", "size": 330, "sizes": []}, "deensimc_tesimonial_contents_background_overlay": "#FFFFFF", "deensimc_tesimonial_content_typography_typography": "custom", "deensimc_tes
